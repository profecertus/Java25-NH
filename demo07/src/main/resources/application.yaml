spring:
    application:
        name: sesion7-apis-rest
    
    messages:
        basename: messages
        encoding: UTF-8

    datasource:
        url: jdbc:h2:mem:productosdb;DB_CLOSE_DELAY=-1
        driver-class-name: org.h2.Driver
        username: sa
        password: ""

    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: true

    h2:
        console:
            enabled: true

#OpenAPI- APIFirst
springdoc:
    swagger-ui:
        path: /swagger-ui.html
        operationsSorter: method

logging:
    level:
        pe.nh.demo07: INFO
        